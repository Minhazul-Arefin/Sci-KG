<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>

<body style="margin:0; background:#f8fafc;">

<div id="graph" style="width:100%; height:100vh;"></div>

<script type="module">

import { Cosmograph } from "https://cdn.jsdelivr.net/npm/@cosmograph/cosmograph@1.6.0/dist/cosmograph.esm.js";

fetch("./graph.json")
  .then(res => res.json())
  .then(data => {

    new Cosmograph(document.getElementById("graph"), {

      nodes: data.nodes,
      links: data.links,

      nodeId: d => d.id,
      linkSource: d => d.source,
      linkTarget: d => d.target,

      backgroundColor: "#f8fafc",

      nodeColor: d => {
        if (d.type === "System") return "#ef4444";
        if (d.type === "File") return "#10b981";
        if (d.type === "Equation") return "#3b82f6";
        if (d.type === "Variable" || d.type === "GlobalVariable")
            return "#facc15";
        if (d.type === "Constant") return "#fb923c";
        return "#94a3b8";
      },

      linkColor: "#d1d5db",
      linkOpacity: 0.25,
      nodeSize: 1.2,
      linkWidth: 0.3,

      simulationGravity: 0.2,
      simulationRepulsion: 2.0
    });

  })
  .catch(err => console.error(err));

</script>

</body>
</html>
