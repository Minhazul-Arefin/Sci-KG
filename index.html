<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/graphology@0.25.1/dist/graphology.umd.min.js"></script>
  <script src="https://unpkg.com/sigma@2.4.0/build/sigma.min.js"></script>
  <style>
    body { margin: 0; background: #f8fafc; }
    #container { width: 100%; height: 100vh; }
  </style>
</head>

<body>
<div id="container"></div>

<script>
fetch("graph.json")
  .then(res => res.json())
  .then(data => {

    const graph = new graphology.Graph();

    data.nodes.forEach(node => {
      let color = "#94a3b8";

      if (node.type === "System") color = "#ef4444";
      else if (node.type === "File") color = "#10b981";
      else if (node.type === "Equation") color = "#3b82f6";
      else if (node.type === "Variable" || node.type === "GlobalVariable")
        color = "#facc15";
      else if (node.type === "Constant")
        color = "#fb923c";

      graph.addNode(node.id, {
        label: node.id,
        size: 2,
        color: color,
      });
    });

    data.links.forEach(link => {
      if (!graph.hasEdge(link.source, link.target)) {
        graph.addEdge(link.source, link.target, {
          size: 0.2,
          color: "#d1d5db",
        });
      }
    });

    new sigma.Sigma(graph, document.getElementById("container"));
  });
</script>

</body>
</html>
