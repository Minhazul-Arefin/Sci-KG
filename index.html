<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sci-KG</title>

  <!-- Graphology -->
  <script src="https://unpkg.com/graphology@0.25.1/dist/graphology.umd.min.js"></script>

  <!-- Sigma v2 -->
  <script src="https://unpkg.com/sigma@2.4.0/build/sigma.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      font-family: Arial, sans-serif;
    }

    #container {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
<div id="container"></div>

<script>

fetch("graph.json")
  .then(res => res.json())
  .then(data => {

    const graph = new graphology.Graph();

    // --- Add Nodes ---
    data.nodes.forEach(node => {

      let color = "#94a3b8";

      if (node.type === "System") color = "#ef4444";        // red
      else if (node.type === "File") color = "#10b981";     // green
      else if (node.type === "Equation") color = "#3b82f6"; // blue
      else if (node.type === "Variable" || node.type === "GlobalVariable")
        color = "#facc15";                                  // yellow
      else if (node.type === "Constant")
        color = "#fb923c";                                  // orange

      graph.addNode(node.id, {
        label: node.id,
        size: 1.8,
        color: color,
        x: Math.random(),
        y: Math.random()
      });

    });

    // --- Add Edges ---
    data.links.forEach(link => {

      if (graph.hasNode(link.source) && graph.hasNode(link.target)) {
        graph.addEdge(link.source, link.target, {
          size: 0.2,
          color: "#d1d5db"
        });
      }

    });

    // --- Initialize Sigma ---
    new sigma.Sigma(graph, document.getElementById("container"), {
      renderEdgeLabels: false,
      labelDensity: 0.05,
      labelGridCellSize: 100,
      defaultNodeType: "circle"
    });

  })
  .catch(error => {
    console.error("Error loading graph:", error);
  });

</script>

</body>
</html>
