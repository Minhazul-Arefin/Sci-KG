<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sci-KG</title>

  <!-- Graphology -->
  <script src="https://unpkg.com/graphology@0.25.1/dist/graphology.umd.min.js"></script>

  <!-- Sigma v2 -->
  <script src="https://unpkg.com/sigma@2.4.0/build/sigma.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      font-family: Arial, sans-serif;
    }

    #container {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
<div id="container"></div>

<script>

fetch("graph.json")
  .then(response => response.json())
  .then(data => {

    // MULTI GRAPH (CRITICAL)
    const graph = new graphology.Graph({ multi: true });

    console.log("Nodes:", data.nodes.length);
    console.log("Edges:", data.links.length);

    // ---- ADD NODES ----
    data.nodes.forEach(node => {

      let color = "#94a3b8";

      if (node.type === "System") color = "#ef4444";
      else if (node.type === "File") color = "#10b981";
      else if (node.type === "Equation") color = "#3b82f6";
      else if (node.type === "Variable" || node.type === "GlobalVariable")
        color = "#facc15";
      else if (node.type === "Constant")
        color = "#fb923c";

      if (!graph.hasNode(node.id)) {
        graph.addNode(node.id, {
          label: node.id,
          size: 1.5,
          color: color,
          x: Math.random(),
          y: Math.random()
        });
      }

    });

    // ---- ADD EDGES (WITH UNIQUE KEY) ----
    data.links.forEach((link, index) => {

      if (graph.hasNode(link.source) && graph.hasNode(link.target)) {

        graph.addEdgeWithKey(
          "e_" + index,   // UNIQUE KEY
          link.source,
          link.target,
          {
            size: 0.2,
            color: "#d1d5db"
          }
        );

      }

    });

    // ---- RENDER ----
    const renderer = new sigma.Sigma(
      graph,
      document.getElementById("container"),
      {
        renderEdgeLabels: false,
        labelDensity: 0.04,
        defaultEdgeColor: "#d1d5db"
      }
    );

    console.log("Graph rendered.");

  })
  .catch(error => {
    console.error("Error loading graph:", error);
  });

</script>

</body>
</html>
